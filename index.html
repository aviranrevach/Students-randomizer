<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Randomizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f1a; overflow: hidden; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script>
  // ============================================================
  //  CONFIG
  // ============================================================
  const photos = [
    "01 יהלי אלדר.png","02 מיקה באומן.jpg","03 תמר בזק.jpg",
    "04 שובל בר-נץ.png","05 משי ברגידה.png","06 איתי גולדשטיין.jpg",
    "08 מיה גרינברג.png","09 עמית כדורי.png","10 עמית מנשה.jpg",
    "11 קרין נבואני.png","12 יובל נימני.jpg","12 לא מזוהה.jpg",
    "13 לידור נעים.png","14 יעל פרייב.png","15 אברהם קמפוס.png",
    "16 שי רוזנברג.png","17 גיא שני.png","18 דניאלה שקליאר.png",
    "19 רותם שרעבי.png"
  ];

  const COLORS = { green: '#5dba7d', blue: '#5080a8', magenta: '#c0508a' };
  const COLOR_NAMES = ['green', 'blue', 'magenta'];
  const MARBLE_R = 18;
  const PIN_R = 6;
  const CW = 800, CH = 1000;

  // Bowl (circular container)
  const BOWL_CX = 400, BOWL_CY = 108, BOWL_R = 130;
  const BOWL_BOT = BOWL_CY + BOWL_R; // 215
  const GATE_GAP = 65;
  const GATE_HALF_ANGLE = Math.asin(GATE_GAP / (2 * BOWL_R));

  // Pins: staggered grid, wide enough to cover bucket area
  const PIN_ROWS = 8;
  const PIN_SP_H = 70, PIN_SP_V = 50;
  const PIN_Y0 = 300;

  // Buckets (U-shaped)
  const BKT_TOP = 660, BKT_BOT = 910;
  const WALL_L = 105, WALL_R = 695;
  const DIV1 = 302, DIV2 = 498;
  const DIV_TOP = 645;
  const BKT_CX = { green: 203, blue: 400, magenta: 597 };
  const BKT_W = 190, BKT_R = BKT_W / 2; // U-shape radius

  // ============================================================
  //  STATE
  // ============================================================
  let state = 'loading';
  let gateOpening = false, gateAnim = 0;
  let showNames = false, overlayAlpha = 0, completeTime = 0;
  let engine, gateBody;
  let marbles = [], pinBodies = [], confetti = [];
  let audioCtx, lastPinSound = 0, lastLandSound = 0, lastTimestamp = null;
  const studentImages = {}, marbleTextures = {};
  let collisionHandler, updateHandler;
  const bucketCounts = { green: 0, blue: 0, magenta: 0 };
  const bucketTotals = { green: 0, blue: 0, magenta: 0 };

  // Camera
  let vw = window.innerWidth, vh = window.innerHeight;
  const camera = { cy: 130, zoom: 1 };
  const camTarget = { cy: 130, zoom: 1 };

  function getIdleZoom() {
    const bs = Math.min(vw / CW, (vh - 50) / CH);
    return Math.min(3.0, (vw * 0.7) / (BOWL_R * 2.2 * bs));
  }

  // ============================================================
  //  CANVAS
  // ============================================================
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize() {
    vw = window.innerWidth; vh = window.innerHeight;
    canvas.width = vw * dpr; canvas.height = vh * dpr;
    canvas.style.width = vw + 'px'; canvas.style.height = vh + 'px';
    if (state === 'idle') { const z = getIdleZoom(); camera.zoom = z; camTarget.zoom = z; }
  }
  window.addEventListener('resize', resize);
  resize();

  // ============================================================
  //  MATTER.JS
  // ============================================================
  const { Engine, Bodies, Body, Composite, Events } = Matter;

  // ============================================================
  //  HELPERS
  // ============================================================
  function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; }
  function extractName(f) { return f.replace(/^\d+\s*/, '').replace(/\.\w+$/, ''); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function updateCamera() {
    camera.cy = lerp(camera.cy, camTarget.cy, 0.04);
    camera.zoom = lerp(camera.zoom, camTarget.zoom, 0.04);
  }

  function applyCam() {
    const bs = Math.min(vw / CW, (vh - 50) / CH);
    const s = bs * camera.zoom;
    ctx.translate(vw / 2, 50 + (vh - 50) / 2);
    ctx.scale(s, s);
    ctx.translate(-CW / 2, -camera.cy);
  }

  function isIn(px, py, b) {
    return px >= b.x-b.w/2 && px <= b.x+b.w/2 && py >= b.y-b.h/2 && py <= b.y+b.h/2;
  }

  function getStackPos(asgn, idx) {
    const cx = BKT_CX[asgn];
    const sp = MARBLE_R * 2 + 5;
    const cols = 4;
    const row = Math.floor(idx / cols), col = idx % cols;
    const inRow = Math.min(cols, bucketTotals[asgn] - row * cols);
    const x = cx + (col - (inRow - 1) / 2) * sp;
    // Follow the U-curve for y
    const dx = x - cx;
    const curveY = BKT_BOT - BKT_R + Math.sqrt(Math.max(1, BKT_R * BKT_R - dx * dx));
    return { x, y: curveY - MARBLE_R - 4 - row * sp };
  }

  // ============================================================
  //  SOUND
  // ============================================================
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function snd(freq, type, vol, dur, del) {
    if (!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value=freq; o.type=type;
    const t=audioCtx.currentTime+(del||0);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.01);
  }
  function playPin() { const n=performance.now(); if(n-lastPinSound<40)return; lastPinSound=n; snd(900+Math.random()*500,'sine',0.05,0.035); }
  function playLand() { const n=performance.now(); if(n-lastLandSound<100)return; lastLandSound=n; snd(140+Math.random()*80,'sine',0.1,0.1); }
  function playGate() { snd(90,'triangle',0.18,0.15); snd(1800,'square',0.03,0.04,0.03); }
  function playDone() { [523,659,784].forEach((f,i)=>snd(f,'sine',0.14,0.3,i*0.15)); }

  // ============================================================
  //  IMAGES
  // ============================================================
  function preload(cb) {
    let n=0;
    photos.forEach(p => {
      const img=new Image();
      img.onload=()=>{ studentImages[p]=img; if(++n===photos.length)cb(); };
      img.onerror=()=>{ if(++n===photos.length)cb(); };
      img.src=`Class2026-1_photos/${p}`;
    });
  }

  function makeTexture(img) {
    const s=2, sz=MARBLE_R*2*s;
    const c=document.createElement('canvas'); c.width=c.height=sz;
    const x=c.getContext('2d');
    x.beginPath(); x.arc(sz/2,sz/2,sz/2-s*2,0,Math.PI*2); x.clip();
    const d=Math.min(img.width,img.height);
    x.drawImage(img,(img.width-d)/2,(img.height-d)/2,d,d,0,0,sz,sz);
    return c;
  }
  function makeTextures() { photos.forEach(p=>{ if(studentImages[p]) marbleTextures[p]=makeTexture(studentImages[p]); }); }

  // ============================================================
  //  PHYSICS WORLD
  // ============================================================
  function makeArcSeg(cx, cy, r, a1, a2, opts) {
    const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r;
    const x2=cx+Math.cos(a2)*r, y2=cy+Math.sin(a2)*r;
    return Bodies.rectangle((x1+x2)/2,(y1+y2)/2, Math.hypot(x2-x1,y2-y1)+2, 8,
      { ...opts, angle: Math.atan2(y2-y1,x2-x1) });
  }

  function createWorld() {
    engine = Engine.create({ gravity: { x: 0, y: 1.0 } });
    const S = { isStatic: true }, bodies = [];

    // Ceiling
    bodies.push(Bodies.rectangle(400, BOWL_CY - BOWL_R - 10, 810, 8, S));

    // Bowl rim containment (prevent marbles escaping over the sides)
    const rimY = BOWL_CY - 4;
    const rimLeft = BOWL_CX - BOWL_R;
    const rimRight = BOWL_CX + BOWL_R;
    bodies.push(Bodies.rectangle((WALL_L + rimLeft) / 2, rimY, rimLeft - WALL_L + 16, 8, S));
    bodies.push(Bodies.rectangle((rimRight + WALL_R) / 2, rimY, WALL_R - rimRight + 16, 8, S));

    // Bowl: bottom semicircle (angles 0→PI through PI/2) with gate gap
    const bowlSegs = 16;
    const gateA = Math.PI / 2; // gate at the very bottom
    // Right arc: 0 → (PI/2 - gateHalfAngle)
    const rightEnd = gateA - GATE_HALF_ANGLE;
    for (let i = 0; i < bowlSegs / 2; i++) {
      const a1 = (i / (bowlSegs / 2)) * rightEnd;
      const a2 = ((i + 1) / (bowlSegs / 2)) * rightEnd;
      bodies.push(makeArcSeg(BOWL_CX, BOWL_CY, BOWL_R, a1, a2, { ...S, restitution: 0.3, friction: 0.05 }));
    }
    // Left arc: (PI/2 + gateHalfAngle) → PI
    const leftStart = gateA + GATE_HALF_ANGLE;
    for (let i = 0; i < bowlSegs / 2; i++) {
      const a1 = leftStart + (i / (bowlSegs / 2)) * (Math.PI - leftStart);
      const a2 = leftStart + ((i + 1) / (bowlSegs / 2)) * (Math.PI - leftStart);
      bodies.push(makeArcSeg(BOWL_CX, BOWL_CY, BOWL_R, a1, a2, { ...S, restitution: 0.3, friction: 0.05 }));
    }

    // Gate body at bottom of bowl
    gateBody = Bodies.rectangle(BOWL_CX, BOWL_BOT, GATE_GAP + 4, 8, { ...S, friction: 0.3 });
    bodies.push(gateBody);

    // Side walls (invisible, full height)
    bodies.push(Bodies.rectangle(WALL_L - 8, CH / 2, 8, CH + 100, S));
    bodies.push(Bodies.rectangle(WALL_R + 8, CH / 2, 8, CH + 100, S));

    // Bucket dividers
    const dH = BKT_BOT - DIV_TOP;
    bodies.push(Bodies.rectangle(DIV1, DIV_TOP + dH / 2, 6, dH, { ...S, restitution: 0.2 }));
    bodies.push(Bodies.rectangle(DIV2, DIV_TOP + dH / 2, 6, dH, { ...S, restitution: 0.2 }));

    // Bucket U-shaped floors (arc segments for each bucket)
    [BKT_CX.green, BKT_CX.blue, BKT_CX.magenta].forEach(cx => {
      const segs = 10, r = BKT_R - 4;
      for (let i = 0; i < segs; i++) {
        const a1 = (i / segs) * Math.PI;
        const a2 = ((i + 1) / segs) * Math.PI;
        bodies.push(makeArcSeg(cx, BKT_BOT - r, r, a1, a2, { ...S, restitution: 0.15, friction: 0.3 }));
      }
    });

    // Pins: staggered rectangular grid
    pinBodies = [];
    for (let r = 0; r < PIN_ROWS; r++) {
      const y = PIN_Y0 + r * PIN_SP_V;
      const wide = r % 2 === 0;
      const cnt = wide ? 9 : 8;
      const totalW = (cnt - 1) * PIN_SP_H;
      const x0 = 400 - totalW / 2;
      for (let i = 0; i < cnt; i++) {
        const p = Bodies.circle(x0 + i * PIN_SP_H, y, PIN_R, { ...S, restitution: 0.7, friction: 0.005 });
        p.isPin = true; p.hitT = 0;
        pinBodies.push(p); bodies.push(p);
      }
    }

    Composite.add(engine.world, bodies);

    // Marbles
    marbles = [];
    shuffle([...photos]).forEach((photo, i) => {
      const angle = Math.PI + 0.3 + Math.random() * (Math.PI - 0.6);
      const dist = 20 + Math.random() * (BOWL_R - 40);
      const body = Bodies.circle(
        BOWL_CX + Math.cos(angle) * dist,
        BOWL_CY + Math.sin(angle) * dist,
        MARBLE_R, { restitution: 0.5, friction: 0.04, density: 0.0015 }
      );
      body.isMarble = true; body.assignment = null;
      marbles.push({
        body, photo, name: extractName(photo),
        assignment: null, settled: false, slowFrames: 0,
        settledPos: null, texture: marbleTextures[photo] || null
      });
      Composite.add(engine.world, body);
    });

    setupCollisions();
  }

  // ============================================================
  //  COLLISIONS & FORCES
  // ============================================================
  function setupCollisions() {
    collisionHandler = (ev) => {
      ev.pairs.forEach(({ bodyA, bodyB }) => {
        const m = bodyA.isMarble ? bodyA : (bodyB.isMarble ? bodyB : null);
        const p = bodyA.isPin ? bodyA : (bodyB.isPin ? bodyB : null);
        if (m && p && gateOpening && m.assignment) {
          const dx = BKT_CX[m.assignment] - m.position.x;
          Body.applyForce(m, m.position, { x: Math.sign(dx) * 0.003, y: 0 });
          playPin(); p.hitT = performance.now();
        }
      });
    };

    updateHandler = () => {
      if (!gateOpening) return;
      marbles.forEach(m => {
        if (m.settled) return;
        const b = m.body;
        // Anti-jam in bowl (strong push toward gate)
        if (b.position.y < BOWL_BOT + 30 && b.speed < 1.5) {
          const toCenter = BOWL_CX - b.position.x;
          Body.applyForce(b, b.position, { x: toCenter * 0.00005 + (Math.random() - 0.5) * 0.003, y: 0.002 });
        }
        // Anti-jam on pins (aggressive — no marble should stop)
        if (b.position.y > PIN_Y0 - 10 && b.position.y < BKT_TOP && b.speed < 0.8) {
          Body.applyForce(b, b.position, { x: (Math.random() - 0.5) * 0.006, y: 0.005 });
        }
        // Auto-unstick: if marble barely moves for 2 sec, strong kick
        if (!m._stuckT) m._stuckT = 0;
        if (b.speed < 0.3 && b.position.y < BKT_TOP) {
          m._stuckT++;
          if (m._stuckT > 120) {
            Body.applyForce(b, b.position, { x: (Math.random() - 0.5) * 0.02, y: 0.015 });
            m._stuckT = 0;
          }
        } else { m._stuckT = 0; }
        if (!m.assignment) return;
        const dx = BKT_CX[m.assignment] - b.position.x;
        // Drift correction through pins
        if (b.position.y > BOWL_BOT + 30 && b.position.y < BKT_TOP) {
          Body.applyForce(b, b.position, { x: dx * 0.0001, y: 0 });
        }
        // Strong correction near buckets
        if (b.position.y >= DIV_TOP - 30) {
          Body.applyForce(b, b.position, { x: dx * 0.0005, y: 0 });
        }
        if (Math.abs(b.velocity.x) > 6) Body.setVelocity(b, { x: b.velocity.x * 0.8, y: b.velocity.y });
      });
    };

    Events.on(engine, 'collisionStart', collisionHandler);
    Events.on(engine, 'beforeUpdate', updateHandler);
  }

  // ============================================================
  //  GAME LOGIC
  // ============================================================
  function onStart() {
    if (state !== 'idle') return;
    initAudio(); playGate();
    state = 'starting';
    gateOpening = true; gateAnim = 0;
    camTarget.cy = CH / 2; camTarget.zoom = 1.0;

    const sh = shuffle([...marbles]);
    sh.forEach((m, i) => { m.assignment = COLOR_NAMES[i % 3]; m.body.assignment = m.assignment; });
    bucketTotals.green = bucketTotals.blue = bucketTotals.magenta = 0;
    sh.forEach(m => bucketTotals[m.assignment]++);
  }

  function updateGate() {
    if (!gateOpening || gateAnim >= 1) return;
    gateAnim = Math.min(1, gateAnim + 0.02);
    if (gateBody) {
      Body.setStatic(gateBody, false);
      Body.applyForce(gateBody, gateBody.position, { x: 0, y: 0.005 });
    }
    if (gateAnim >= 0.3 && gateBody) {
      Composite.remove(engine.world, gateBody); gateBody = null;
    }
    if (gateAnim >= 0.5 && state === 'starting') state = 'running';
  }

  function checkSettled() {
    if (state !== 'running') return;
    marbles.forEach(m => {
      if (m.settled) return;
      const { x, y } = m.body.position;
      if (y > BKT_TOP + 10 && m.body.speed < 0.4) {
        m.slowFrames++;
        if (m.slowFrames > 45) {
          m.settled = true;
          const idx = bucketCounts[m.assignment]++;
          m.settledPos = getStackPos(m.assignment, idx);
          Body.setPosition(m.body, m.settledPos);
          Body.setStatic(m.body, true);
          Body.setVelocity(m.body, { x: 0, y: 0 });
          playLand();
        }
      } else { m.slowFrames = 0; }
      if (y > 1100 || x < -50 || x > 850) {
        Body.setPosition(m.body, { x: BOWL_CX, y: BOWL_CY });
        Body.setVelocity(m.body, { x: 0, y: 0 });
      }
    });
    if (marbles.every(m => m.settled)) { state = 'complete'; completeTime = performance.now(); launchConfetti(); playDone(); }
  }

  let shakeT = 0; // screen shake timer

  function onNudge() {
    shakeT = 12; // shake for 12 frames
    marbles.forEach(m => {
      if (m.settled) return;
      Body.applyForce(m.body, m.body.position, {
        x: (Math.random() - 0.5) * 0.015,
        y: 0.01
      });
    });
  }

  function onReset() {
    if (state !== 'complete') return;
    state = 'idle'; showNames = false; overlayAlpha = 0;
    gateOpening = false; gateAnim = 0; confetti.length = 0; lastTimestamp = null;
    bucketCounts.green = bucketCounts.blue = bucketCounts.magenta = 0;
    const z = getIdleZoom();
    camera.cy = 130; camera.zoom = z; camTarget.cy = 130; camTarget.zoom = z;
    Events.off(engine, 'collisionStart', collisionHandler);
    Events.off(engine, 'beforeUpdate', updateHandler);
    Composite.clear(engine.world);
    marbles = []; pinBodies = []; gateBody = null;
    createWorld();
  }

  // ============================================================
  //  CONFETTI
  // ============================================================
  function launchConfetti() {
    const c=['#5dba7d','#5080a8','#c0508a','#ffeb3b','#ff9800','#fff'];
    for(let i=0;i<180;i++) confetti.push({
      x:vw*Math.random(), y:-20-Math.random()*400,
      w:4+Math.random()*10, h:3+Math.random()*6,
      color:c[0|Math.random()*c.length],
      vy:1.5+Math.random()*3, vx:(Math.random()-0.5)*2.5,
      rot:Math.random()*6.28, rv:(Math.random()-0.5)*0.2, op:1
    });
  }
  function drawConfetti() {
    for(let i=confetti.length-1;i>=0;i--){
      const c=confetti[i]; c.x+=c.vx; c.y+=c.vy; c.rot+=c.rv;
      if(c.y>vh+50)c.op-=0.03; if(c.op<=0){confetti.splice(i,1);continue;}
      ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
      ctx.globalAlpha=c.op; ctx.fillStyle=c.color;
      ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h); ctx.restore();
    }
  }

  // ============================================================
  //  DRAW — WORLD SPACE
  // ============================================================
  function drawBowl() {
    ctx.save();
    // Shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(BOWL_CX, BOWL_CY + 3, BOWL_R + 1, Math.PI, 0, true);
    ctx.stroke();

    // Metallic gradient
    const g = ctx.createLinearGradient(BOWL_CX - BOWL_R, 0, BOWL_CX + BOWL_R, 0);
    g.addColorStop(0, '#555'); g.addColorStop(0.25, '#999');
    g.addColorStop(0.5, '#bbb'); g.addColorStop(0.75, '#999'); g.addColorStop(1, '#555');
    ctx.strokeStyle = g;
    ctx.lineWidth = 7;

    if (gateAnim < 0.05) {
      ctx.beginPath();
      ctx.arc(BOWL_CX, BOWL_CY, BOWL_R, Math.PI, 0, true);
      ctx.stroke();
    } else {
      const gap = GATE_HALF_ANGLE + gateAnim * 0.35;
      ctx.beginPath();
      ctx.arc(BOWL_CX, BOWL_CY, BOWL_R, Math.PI, Math.PI / 2 + gap, true);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(BOWL_CX, BOWL_CY, BOWL_R, Math.PI / 2 - gap, 0, true);
      ctx.stroke();
    }

    // Inner highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(BOWL_CX, BOWL_CY, BOWL_R - 7, Math.PI - 0.1, 0.1, true);
    ctx.stroke();

    ctx.restore();
  }

  function drawGate() {
    if (gateAnim >= 0.3) return;
    ctx.save();
    ctx.globalAlpha = 1 - gateAnim * 3;
    ctx.fillStyle = '#888';
    const drop = gateAnim * 80;
    ctx.beginPath();
    ctx.roundRect(BOWL_CX - GATE_GAP / 2 - 2, BOWL_BOT - 4 + drop, GATE_GAP + 4, 8, 3);
    ctx.fill();
    ctx.restore();
  }

  function drawPins() {
    const now = performance.now();
    pinBodies.forEach(p => {
      const { x, y } = p.position;
      const hit = (now - p.hitT) < 100;

      // Drop shadow
      ctx.beginPath();
      ctx.arc(x + 1.5, y + 2.5, PIN_R + 1, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fill();

      // 3D hemisphere
      const g = ctx.createRadialGradient(x - 2, y - 2, 0, x + 1, y + 1, PIN_R + 1);
      g.addColorStop(0, hit ? '#fff' : '#d0d0d0');
      g.addColorStop(0.4, hit ? '#ccc' : '#a0a0a0');
      g.addColorStop(1, hit ? '#888' : '#606060');
      ctx.beginPath();
      ctx.arc(x, y, PIN_R, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      // Specular highlight
      ctx.beginPath();
      ctx.arc(x - 2, y - 2, PIN_R * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fill();
    });
  }

  function drawBuckets() {
    const bkts = [
      { cx: BKT_CX.green, key: 'green', label: 'Group 1' },
      { cx: BKT_CX.blue, key: 'blue', label: 'Group 2' },
      { cx: BKT_CX.magenta, key: 'magenta', label: 'Group 3' },
    ];

    bkts.forEach(b => {
      const c = COLORS[b.key];
      const left = b.cx - BKT_W / 2, right = b.cx + BKT_W / 2;
      const arcCY = BKT_BOT - BKT_R;

      // Shadow
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(left + 3, BKT_TOP);
      ctx.lineTo(left + 3, arcCY + 4);
      ctx.arc(b.cx + 2, arcCY + 4, BKT_R, Math.PI, 0, true);
      ctx.lineTo(right + 3, BKT_TOP);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fill();
      ctx.restore();

      // U-shape fill
      ctx.beginPath();
      ctx.moveTo(left, BKT_TOP);
      ctx.lineTo(left, arcCY);
      ctx.arc(b.cx, arcCY, BKT_R, Math.PI, 0, true);
      ctx.lineTo(right, BKT_TOP);
      ctx.fillStyle = c + '30';
      ctx.fill();

      // U-shape border
      ctx.beginPath();
      ctx.moveTo(left, BKT_TOP);
      ctx.lineTo(left, arcCY);
      ctx.arc(b.cx, arcCY, BKT_R, Math.PI, 0, true);
      ctx.lineTo(right, BKT_TOP);
      ctx.strokeStyle = c + '55';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Label
      ctx.fillStyle = c;
      ctx.font = '600 13px "Inter", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.cx, BKT_TOP - 10);
    });
  }

  function drawMarbles() {
    marbles.forEach(m => {
      const pos = m.settled ? m.settledPos : m.body.position;
      if (!pos) return;
      const { x, y } = pos;

      // Drop shadow
      ctx.beginPath();
      ctx.arc(x + 1.5, y + 2, MARBLE_R, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fill();

      ctx.save(); ctx.translate(x, y);
      if (m.texture) {
        ctx.drawImage(m.texture, -MARBLE_R, -MARBLE_R, MARBLE_R * 2, MARBLE_R * 2);
      } else {
        ctx.beginPath(); ctx.arc(0, 0, MARBLE_R - 2, 0, Math.PI * 2);
        ctx.fillStyle = '#444'; ctx.fill();
      }
      // Border: neutral until settled
      ctx.beginPath(); ctx.arc(0, 0, MARBLE_R - 1, 0, Math.PI * 2);
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = m.settled ? COLORS[m.assignment] : 'rgba(255,255,255,0.2)';
      ctx.stroke();
      // Glass highlight
      ctx.beginPath(); ctx.arc(-MARBLE_R * 0.25, -MARBLE_R * 0.25, MARBLE_R * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
      ctx.restore();
    });
  }

  // ============================================================
  //  DRAW — SCREEN SPACE
  // ============================================================
  function drawBg() {
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, vw, vh);
  }

  function drawTitle() {
    ctx.fillStyle = '#ffffff';
    ctx.font = '700 26px "Inter", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('The Randomizer', vw / 2, 14);
  }

  function drawBtn() {
    const bx = vw / 2, by = vh - 42;

    if (state === 'idle') {
      // Theater marquee START button with chasing bulb lights
      const bw = 220, bh = 58, r = 14;
      const t = performance.now();
      const pad = 10; // space for lights between outer and inner rect

      // Warm ambient glow behind entire button
      ctx.save();
      ctx.shadowColor = 'rgba(255,160,40,0.4)'; ctx.shadowBlur = 35;
      ctx.fillStyle = 'rgba(255,140,30,0.08)';
      ctx.beginPath(); ctx.roundRect(bx - bw/2 - pad - 4, by - bh/2 - pad - 4, bw + pad*2 + 8, bh + pad*2 + 8, r + pad + 4); ctx.fill();
      ctx.restore();

      // Outer frame (dark red)
      ctx.fillStyle = '#8b1a1a';
      ctx.beginPath(); ctx.roundRect(bx - bw/2 - pad, by - bh/2 - pad, bw + pad*2, bh + pad*2, r + pad); ctx.fill();

      // Light channel groove (slightly recessed track for bulbs)
      ctx.strokeStyle = '#5a1010';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(bx - bw/2 - pad + 2, by - bh/2 - pad + 2, bw + pad*2 - 4, bh + pad*2 - 4, r + pad - 2); ctx.stroke();

      // Chase lights — 3 groups cycling for classic marquee effect
      const numLights = 32;
      const speed = t / 200;
      for (let i = 0; i < numLights; i++) {
        const frac = i / numLights;
        // 3-phase chase: each bulb in one of 3 groups
        const group = i % 3;
        const wave = (speed + group / 3) % 1;
        const bright = 0.15 + 0.85 * Math.max(0, Math.cos(wave * Math.PI * 2)) ** 2;

        // Position along rounded rect perimeter
        const totalPerim = 2 * (bw + bh - 4) + 2 * Math.PI * (r + 3);
        const d = frac * totalPerim;
        const hw = bw / 2 - r, hh = bh / 2 - r;
        const straight = 2 * hw + 2 * hh; // total straight segments
        const cornerLen = 0.5 * Math.PI * (r + 3); // each corner arc
        let lx, ly;

        // Top edge (left to right)
        if (d < 2 * hw) {
          lx = bx - hw + d; ly = by - bh / 2 - 3;
        }
        // Right edge
        else if (d < 2 * hw + 2 * hh) {
          const dd = d - 2 * hw;
          lx = bx + bw / 2 + 3; ly = by - hh + dd;
        }
        // Bottom edge (right to left)
        else if (d < 4 * hw + 2 * hh) {
          const dd = d - 2 * hw - 2 * hh;
          lx = bx + hw - dd; ly = by + bh / 2 + 3;
        }
        // Left edge
        else {
          const dd = d - 4 * hw - 2 * hh;
          lx = bx - bw / 2 - 3; ly = by + hh - dd;
        }

        // Bulb glow halo
        if (bright > 0.5) {
          ctx.save();
          const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, 8);
          glow.addColorStop(0, `rgba(255,200,60,${bright * 0.35})`);
          glow.addColorStop(1, 'rgba(255,150,30,0)');
          ctx.fillStyle = glow;
          ctx.beginPath(); ctx.arc(lx, ly, 8, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }

        // Bulb body
        const g = ctx.createRadialGradient(lx - 0.5, ly - 0.5, 0, lx, ly, 3.5);
        const r255 = 255, gv = 150 + 105 * bright | 0, bv = 20 + 50 * bright | 0;
        g.addColorStop(0, `rgb(255,${Math.min(255, gv + 40)},${bv + 30})`);
        g.addColorStop(0.6, `rgb(${r255},${gv},${bv})`);
        g.addColorStop(1, `rgb(${120 + 80 * bright|0},${60 + 40 * bright|0},${10})`);
        ctx.beginPath(); ctx.arc(lx, ly, 3.2, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      }

      // Inner dark panel
      ctx.fillStyle = '#1c0808';
      ctx.beginPath(); ctx.roundRect(bx - bw/2, by - bh/2, bw, bh, r); ctx.fill();
      // Subtle inner border
      ctx.strokeStyle = '#3a1515';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(bx - bw/2 + 1, by - bh/2 + 1, bw - 2, bh - 2, r - 1); ctx.stroke();

      // Gold text with subtle glow
      ctx.save();
      ctx.shadowColor = 'rgba(255,215,0,0.4)'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffd700'; ctx.font = '700 24px "Inter", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\u25B6  START', bx, by);
      ctx.restore();

    } else if (state === 'starting' || state === 'running') {
      // Small nudge pill
      const bw = 120, bh = 38;
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, bh / 2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#aaa'; ctx.font = '600 14px "Inter", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\u261D Nudge', bx, by);

    } else if (state === 'complete' && showNames) {
      const bw = 190, bh = 50;
      ctx.save();
      ctx.shadowColor = 'rgba(90,180,120,0.3)'; ctx.shadowBlur = 20; ctx.shadowOffsetY = 3;
      const g = ctx.createLinearGradient(bx - bw / 2, 0, bx + bw / 2, 0);
      g.addColorStop(0, COLORS.green); g.addColorStop(0.5, COLORS.blue); g.addColorStop(1, COLORS.magenta);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, bh / 2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#fff'; ctx.font = '700 18px "Inter", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\u21BA  RESET', bx, by);
    }
  }

  function drawOverlay() {
    if (!showNames || overlayAlpha <= 0) return;
    ctx.save(); ctx.globalAlpha = overlayAlpha;
    const pad = Math.max(20, vw * 0.03);
    const ow = Math.min(780, vw - pad * 2), oh = Math.min(680, vh - pad * 2 - 60);
    const ox = (vw - ow) / 2, oy = Math.max(55, (vh - oh) / 2);

    ctx.fillStyle = 'rgba(12,12,22,0.97)';
    ctx.beginPath(); ctx.roundRect(ox, oy, ow, oh, 20); ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(ox, oy, ow, oh, 20); ctx.stroke();

    ctx.fillStyle = '#fff'; ctx.font = '700 30px "Inter", sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('Results', vw / 2, oy + 48);
    ctx.strokeStyle = '#1f1f2f'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(ox + 30, oy + 68); ctx.lineTo(ox + ow - 30, oy + 68); ctx.stroke();

    const groups = { green: [], blue: [], magenta: [] };
    marbles.forEach(m => groups[m.assignment].push(m));
    const colW = ow / 3;

    [
      { key: 'green', cx: ox + colW * 0.5, label: 'Group 1' },
      { key: 'blue', cx: ox + colW * 1.5, label: 'Group 2' },
      { key: 'magenta', cx: ox + colW * 2.5, label: 'Group 3' },
    ].forEach(col => {
      ctx.fillStyle = COLORS[col.key]; ctx.font = '700 17px "Inter", sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(col.label, col.cx, oy + 100);
      ctx.strokeStyle = COLORS[col.key] + '33'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(col.cx - 55, oy + 112); ctx.lineTo(col.cx + 55, oy + 112); ctx.stroke();

      groups[col.key].forEach((m, i) => {
        const ry = oy + 140 + i * 46;
        if (m.texture) {
          ctx.save();
          ctx.beginPath(); ctx.arc(col.cx - 58, ry, 15, 0, Math.PI * 2); ctx.clip();
          ctx.drawImage(m.texture, col.cx - 73, ry - 15, 30, 30);
          ctx.restore();
          ctx.beginPath(); ctx.arc(col.cx - 58, ry, 15, 0, Math.PI * 2);
          ctx.strokeStyle = COLORS[col.key] + '66'; ctx.lineWidth = 2; ctx.stroke();
        }
        ctx.fillStyle = '#e0e0e0'; ctx.font = '400 15px "Inter", sans-serif';
        ctx.textAlign = 'left'; ctx.fillText(m.name, col.cx - 36, ry + 5);
      });
    });
    ctx.restore();
  }

  function drawLoading() {
    ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, vw, vh);
    ctx.fillStyle = '#555'; ctx.font = '400 18px "Inter", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Loading...', vw / 2, vh / 2);
  }

  // ============================================================
  //  RENDER
  // ============================================================
  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (state === 'loading') { drawLoading(); return; }

    // Screen shake
    if (shakeT > 0) {
      const intensity = shakeT * 0.6;
      ctx.translate((Math.random() - 0.5) * intensity, (Math.random() - 0.5) * intensity);
      shakeT--;
    }

    drawBg();
    ctx.save(); applyCam();
    drawBuckets();
    drawPins();
    drawMarbles();
    drawBowl();
    drawGate();
    ctx.restore();
    drawTitle(); drawBtn();
    if (state === 'complete') {
      const el = performance.now() - completeTime;
      if (el > 1800) { showNames = true; overlayAlpha = Math.min(1, (el - 1800) / 500); }
    }
    drawOverlay(); drawConfetti();
  }

  // ============================================================
  //  GAME LOOP
  // ============================================================
  function loop(ts) {
    if (state !== 'loading') {
      if (lastTimestamp !== null) Engine.update(engine, Math.min(ts - lastTimestamp, 32));
      lastTimestamp = ts;
      updateCamera(); updateGate();
      if (state === 'running') checkSettled();
    }
    render(); requestAnimationFrame(loop);
  }

  // ============================================================
  //  INPUT
  // ============================================================
  function btnRect() {
    if (state === 'idle') return { x: vw/2, y: vh-42, w: 220, h: 68 };
    if (state === 'starting' || state === 'running') return { x: vw/2, y: vh-42, w: 120, h: 38 };
    return { x: vw/2, y: vh-42, w: 190, h: 50 };
  }
  function onClick(px, py) {
    const b = btnRect();
    if (state === 'idle' && isIn(px, py, b)) onStart();
    else if ((state === 'starting' || state === 'running') && isIn(px, py, b)) onNudge();
    else if (state === 'complete' && showNames && isIn(px, py, b)) onReset();
  }
  canvas.addEventListener('click', e => onClick(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; onClick(t.clientX, t.clientY); }, { passive: false });
  canvas.addEventListener('mousemove', e => {
    const b = btnRect();
    const show = state === 'idle' || state === 'starting' || state === 'running' || (state === 'complete' && showNames);
    canvas.style.cursor = show && isIn(e.clientX, e.clientY, b) ? 'pointer' : 'default';
  });

  // ============================================================
  //  INIT
  // ============================================================
  camera.zoom = camTarget.zoom = getIdleZoom();
  requestAnimationFrame(() => render());
  preload(() => { makeTextures(); createWorld(); state = 'idle'; requestAnimationFrame(loop); });

  </script>
</body>
